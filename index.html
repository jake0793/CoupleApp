<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#61b243">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Our Week">
<title>Our Week Together</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#cdeffb;-webkit-font-smoothing:antialiased}
  a{color:#4f9a3a;text-decoration:none} a:hover{color:#3d7a2e;text-decoration:underline}
  input,textarea{font-family:Nunito,sans-serif}
  input:focus,textarea:focus{outline:none}
  ::placeholder{color:#c3b48f}
  @keyframes acFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  @keyframes acPop{0%{transform:scale(.96);opacity:0}100%{transform:scale(1);opacity:1}}
  @keyframes acWiggle{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
  @keyframes acBounce{0%,100%{transform:translateY(0) scale(1)}30%{transform:translateY(-9px) scale(1.03,.97)}50%{transform:translateY(0) scale(.97,1.03)}70%{transform:translateY(-3px) scale(1)}}
  .tabbar{scrollbar-width:none}
  .tabbar::-webkit-scrollbar{display:none}
  .daycard{transition:transform .12s ease,box-shadow .12s ease}
  .daycard:hover{transform:translateY(-3px);box-shadow:0 9px 0 rgba(120,150,80,.13)!important;border-color:#d4be82!important}
  .pickrow:hover{border-color:#8fce63!important;background:#f4faea!important}
  #boot-msg{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;font-family:Nunito,sans-serif;font-weight:700;color:#7a5f3b;background:linear-gradient(180deg,#ffd3a6,#eec6d6 45%,#c6d78a);text-align:center;padding:30px}
  #boot-msg .sun{width:52px;height:52px;border-radius:50%;background:radial-gradient(circle at 38% 34%,#fff3b8,#ffd245);box-shadow:0 0 24px rgba(255,220,110,.6);animation:acFloat 2.5s ease-in-out infinite}
</style>
</head>
<body>
<div id="root"></div>
<div id="boot-msg"><div class="sun"></div><div id="boot-text">Setting the table…</div></div>
<script>
  window.__SUPA_URL = 'https://lctybyllbgswhwhmgqui.supabase.co';  /* filled at build */
  window.__SUPA_KEY = 'sb_publishable_YkFbeooSNKvbvyGOgULixQ_naYwOCIK';
</script>
<script src="https://cdn.jsdelivr.net/npm/preact@10.19.3/dist/preact.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/htm@3.1.1/dist/htm.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.2/dist/umd/supabase.js"></script>

<script>
  /* app-bundle loader: fetches the current app build from the household's own
     backend, caches it for offline, and boots it. The GitHub page never needs
     to change again — updates are pushed straight to the bundle store. */
  (async function boot() {
    const say = t => { const el = document.getElementById('boot-text'); if (el) el.textContent = t; };
    let bundle = window.__BUNDLE_INLINE || null;
    if (!bundle) {
      try {
        const sb = window.supabase.createClient(window.__SUPA_URL, window.__SUPA_KEY);
        const timeout = new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 7000));
        const { data } = await Promise.race([sb.rpc('get_bundle'), timeout]);
        if (data && data.data) { bundle = data; try { localStorage.setItem('ac-bundle', JSON.stringify(data)); } catch (e) {} }
      } catch (e) {}
    }
    if (!bundle) { try { bundle = JSON.parse(localStorage.getItem('ac-bundle') || 'null'); } catch (e) {} }
    if (!bundle || !bundle.data) { say("Can't reach the cloud to load the app \u2014 check your internet and reopen \u2665"); return; }
    try {
      const bytes = Uint8Array.from(atob(bundle.data), c => c.charCodeAt(0));
      const js = await new Response(new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'))).text();
      const bm = document.getElementById('boot-msg'); if (bm) bm.remove();
      (0, eval)(js);
    } catch (e) { say('App failed to start: ' + e.message); }
  })();
  if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
    addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
  }
</script>
</body>
</html>
